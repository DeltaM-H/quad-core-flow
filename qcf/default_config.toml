# qcf 默认配置
# 在项目根目录放置 qcf.toml 覆盖这些值

[workspace]
# docs_dir = "output/docs"
# status_file = "/tmp/qcf-status.json"
# log_dir = "/tmp"

[stages]
# max_rounds = 3
# implement_timeout = 600
# fix_timeout = 600
# review_timeout = 300
# audit_timeout = 300

[models]
# Per-perspective review models (individual takes priority)
# "api-reviewer" = "sonnet"
# "code-quality-reviewer" = "sonnet"
# "arch-reviewer" = "sonnet"
# "review" sets all perspectives as fallback:
# review = "sonnet"
# "security-reviewer" = ""

[paths]
# 所有路径相对于 workspace.docs_dir，除非是绝对路径
# tech_lead = "tech-lead"
# code_reviewer = "code-reviewer"
# security_reviewer = "security-reviewer"
# coder = "coder"
# out_review = "code-reviewer"
# out_audit = "security-reviewer"
# fail = "qcf"

[files]
# issues = "/tmp/qcf-issues-latest.txt"
# review_issues = "/tmp/qcf-review-issues.txt"
# audit_issues = "/tmp/qcf-audit-issues.txt"
# scope = "/tmp/qcf-scope.json"  # changed_files, dependencies, out_of_scope (written by implement)
# summary = "/tmp/qcf-summary.md" # detailed summary for reviewer (written by implement)

[commit]
# enabled = true
# message_template = "feat(pipeline): round-{round_num:02d} all checks passed"
# co_author = "Claude Opus 4.7 <noreply@anthropic.com>"

[claude]
# allowed_tools = ["Write", "Read", "Edit", "Bash"]
# output_format = "json"
# max_output_tokens = 8192       # Cap output tokens per stage (0 = unlimited)
# thinking_budget = 4096         # Thinking budget (optional)

[hooks]
# Shell commands executed at pipeline lifecycle events.
# Each command receives QCF_* env vars for context.
# Available events: post-start, pre-stage, post-stage, post-round,
#                   on-passed, on-failed, on-exhausted
# post-start = ["echo 'started: doc=$QCF_DESIGN_DOC'"]
# on-passed = ["notify-send 'Pipeline passed'"]
#
# Alternatively, place executable scripts in .qcf-hooks/<event>/
# (git-hooks style) for more complex logic.

[evolution]
# Self-evolution sandbox settings
# enabled = true
# worktree_base = "../evolve"
# evolve_timeout = 600
# meta_audit_timeout = 300
# max_consecutive_fails = 3
